# Runs lint + test (+ a production build check) on every push and pull
# request. This is the pre-deploy gate: enable it as a required status check
# in GitHub branch protection for `main` so that merges — and therefore
# Vercel's automatic deployment on push to `main` — only happen once this
# passes. See README "Vercel 배포" for the full deployment setup.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: student_assessment
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/student_assessment?schema=public
      SESSION_SECRET: ci-test-secret-not-for-production
      APP_URL: http://localhost:3000
      CRON_SECRET: ci-test-cron-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - run: npm test

      - name: Verify production build
        run: npm run build
